name: queuectl CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"

    - name: Run linting
      run: |
        pip install flake8
        flake8 queuectl/ --max-line-length=120 --ignore=E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Run integration tests
      run: |
        python tests/test_scenarios.py

    - name: Run Phase 1 tests
      run: |
        python tests/test_phase1_enhancements.py

    - name: Run Phase 2 tests
      run: |
        python tests/test_phase2.py

    - name: Run Phase 3 tests
      run: |
        python tests/test_phase3.py

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t queuectl:latest .

    - name: Test Docker image
      run: |
        docker run --rm queuectl:latest queuectl --version
        docker run --rm queuectl:latest queuectl status
