<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependency Graph - Queuectl</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .graph-container {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-top: 2rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #graph-svg {
            width: 100%;
            height: 700px;
            background: #0a0e1a;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node circle {
            stroke-width: 3px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }
        
        .node text {
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
        }
        
        .node:hover circle {
            stroke-width: 5px;
            filter: drop-shadow(0 6px 12px rgba(99, 102, 241, 0.5));
        }
        
        .link {
            fill: none;
            stroke-width: 2px;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        
        .link:hover {
            stroke-width: 3px;
            opacity: 1;
        }
        
        .link-arrow {
            fill: #64748b;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .legend {
            display: flex;
            gap: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .job-details-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-card);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            transition: right 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .job-details-panel.open {
            right: 0;
        }
        
        .close-panel {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">🕸️</span>
                    Dependency Graph
                </h1>
                <div class="header-actions">
                    <a href="/jobs" class="btn btn-secondary">
                        <span class="icon">📋</span> Jobs
                    </a>
                    <a href="/" class="btn btn-primary">
                        <span class="icon">🏠</span> Dashboard
                    </a>
                </div>
            </div>
        </header>

        <div class="graph-container">
            <div class="controls">
                <button class="btn btn-primary" onclick="loadGraph()">
                    <span class="icon">🔄</span> Refresh Graph
                </button>
                <button class="btn btn-secondary" onclick="resetZoom()">
                    <span class="icon">🔍</span> Reset Zoom
                </button>
                <button class="btn btn-secondary" onclick="fitToScreen()">
                    <span class="icon">📐</span> Fit to Screen
                </button>
                <button class="btn btn-secondary" onclick="exportGraph()">
                    <span class="icon">💾</span> Export PNG
                </button>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #10b981;"></div>
                    <span>Completed</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #3b82f6;"></div>
                    <span>Processing</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fbbf24;"></div>
                    <span>Pending</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ef4444;"></div>
                    <span>Failed</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #6b7280;"></div>
                    <span>Cancelled</span>
                </div>
            </div>

            <svg id="graph-svg"></svg>
        </div>
    </div>

    <!-- Job Details Panel -->
    <div class="job-details-panel" id="detailsPanel">
        <button class="close-panel" onclick="closePanel()">×</button>
        <div id="panelContent">
            <p style="color: var(--text-muted);">Click on a node to see details</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/graph.js') }}"></script>
</body>
</html>
