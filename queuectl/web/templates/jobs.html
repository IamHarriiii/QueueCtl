<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs — queuectl</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-primary:#0f1117;--bg-secondary:#1a1d2e;--bg-card:#1e2235;--bg-hover:#252a40;--text-primary:#e4e6f0;--text-secondary:#8b8fa3;--text-muted:#5b5f73;--accent-blue:#4f8ff7;--accent-green:#34d399;--accent-red:#f87171;--accent-yellow:#fbbf24;--accent-purple:#a78bfa;--accent-cyan:#22d3ee;--border:#2a2e42;--radius:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
        .navbar{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:64px;position:sticky;top:0;z-index:100}
        .navbar-brand{font-size:1.25rem;font-weight:700;color:var(--accent-blue);text-decoration:none;display:flex;align-items:center;gap:.5rem}
        .nav-links{display:flex;gap:1.5rem;margin-left:2rem;list-style:none}
        .nav-links a{color:var(--text-secondary);text-decoration:none;font-size:.9rem;font-weight:500;padding:.5rem 0;border-bottom:2px solid transparent;transition:all .2s}
        .nav-links a:hover,.nav-links a.active{color:var(--text-primary);border-bottom-color:var(--accent-blue)}
        .container{max-width:1400px;margin:0 auto;padding:1.5rem 2rem}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
        .page-header h1{font-size:1.5rem;font-weight:600}
        .search-bar{display:flex;gap:.5rem}
        .search-bar input{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:.5rem 1rem;border-radius:8px;font-size:.85rem;width:250px}
        .search-bar input::placeholder{color:var(--text-muted)}
        .filter-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
        .filter-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}
        .filter-btn:hover,.filter-btn.active{background:var(--accent-blue);border-color:var(--accent-blue);color:white}
        .table-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:.75rem 1.25rem;color:var(--text-muted);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
        td{padding:.75rem 1.25rem;border-bottom:1px solid var(--border);font-size:.85rem}
        tr:hover td{background:var(--bg-hover)}
        .state-badge{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.75rem;font-weight:600;text-transform:uppercase}
        .state-pending{background:rgba(251,191,36,.15);color:var(--accent-yellow)}
        .state-processing{background:rgba(79,143,247,.15);color:var(--accent-blue)}
        .state-completed{background:rgba(52,211,153,.15);color:var(--accent-green)}
        .state-failed{background:rgba(248,113,113,.15);color:var(--accent-red)}
        .state-dead{background:rgba(167,139,250,.15);color:var(--accent-purple)}
        .state-cancelled{background:rgba(91,95,115,.15);color:var(--text-muted)}
        .priority-badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
        .priority-high{background:rgba(248,113,113,.15);color:var(--accent-red)}
        .priority-medium{background:rgba(251,191,36,.15);color:var(--accent-yellow)}
        .priority-low{background:rgba(91,95,115,.15);color:var(--text-muted)}
        .tag{display:inline-block;background:rgba(79,143,247,.1);color:var(--accent-blue);padding:.1rem .4rem;border-radius:3px;font-size:.7rem;margin-right:.25rem}
        .cmd-text{font-family:'SF Mono','Fira Code',monospace;color:var(--text-secondary);font-size:.8rem}
        .action-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:.25rem .6rem;border-radius:4px;cursor:pointer;font-size:.75rem;margin-right:.25rem;transition:all .2s}
        .action-btn:hover{background:var(--accent-blue);border-color:var(--accent-blue);color:white}
        .action-btn.danger:hover{background:var(--accent-red);border-color:var(--accent-red)}
        .empty{text-align:center;padding:3rem;color:var(--text-muted)}
        .pagination{display:flex;justify-content:center;gap:.5rem;margin-top:1rem;padding:1rem}
        .pagination button{background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);padding:.4rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem}
        .pagination button:hover{background:var(--accent-blue);color:white}
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand"><span>⚡</span> queuectl</a>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/jobs" class="active">Jobs</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="page-header">
            <h1>Jobs</h1>
            <div class="search-bar">
                <input type="text" id="search" placeholder="Search by ID or command..." oninput="searchJobs()">
            </div>
        </div>
        <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('','state',this)">All States</button>
            <button class="filter-btn" onclick="setFilter('pending','state',this)">Pending</button>
            <button class="filter-btn" onclick="setFilter('processing','state',this)">Processing</button>
            <button class="filter-btn" onclick="setFilter('completed','state',this)">Completed</button>
            <button class="filter-btn" onclick="setFilter('failed','state',this)">Failed</button>
            <button class="filter-btn" onclick="setFilter('dead','state',this)">DLQ</button>
            <button class="filter-btn" onclick="setFilter('cancelled','state',this)">Cancelled</button>
            <span style="color:var(--text-muted);padding:.35rem .5rem;font-size:.8rem">|</span>
            <button class="filter-btn" onclick="setFilter('','priority',this)">All Priority</button>
            <button class="filter-btn" onclick="setFilter('high','priority',this)">🔴 High</button>
            <button class="filter-btn" onclick="setFilter('medium','priority',this)">🟡 Medium</button>
            <button class="filter-btn" onclick="setFilter('low','priority',this)">⚪ Low</button>
        </div>
        <div class="table-card">
            <table>
                <thead><tr><th>ID</th><th>Command</th><th>State</th><th>Priority</th><th>Tags</th><th>Attempts</th><th>Exit Code</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody id="jobs-tbody"><tr><td colspan="9" class="empty">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script>
        let filters = {state:'',priority:''};
        function setFilter(val,type,el){
            filters[type]=val;
            document.querySelectorAll('.filter-btn').forEach(b=>{
                if(b.textContent.includes(type==='state'?'State':'Priority')||b===el){}
            });
            el.parentElement.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active');
            loadJobs();
        }
        function getPriorityName(p){return{0:'low',1:'medium',2:'high'}[p]||'medium'}
        function formatDate(d){if(!d)return'—';return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
        async function loadJobs(){
            let url='/api/jobs?limit=50';
            if(filters.state)url+=`&state=${filters.state}`;
            if(filters.priority)url+=`&priority=${filters.priority}`;
            const data=await(await fetch(url)).json();
            const tbody=document.getElementById('jobs-tbody');
            const search=document.getElementById('search').value.toLowerCase();
            let jobs=data.jobs||[];
            if(search)jobs=jobs.filter(j=>j.id.toLowerCase().includes(search)||j.command.toLowerCase().includes(search));
            if(!jobs.length){tbody.innerHTML='<tr><td colspan="9" class="empty">No jobs found</td></tr>';return}
            tbody.innerHTML=jobs.map(j=>{
                const id=j.id.length>20?j.id.slice(0,18)+'…':j.id;
                const cmd=j.command.length>35?j.command.slice(0,33)+'…':j.command;
                const pName=getPriorityName(j.priority);
                const tags=j.tags?j.tags.split(',').map(t=>`<span class="tag">${t.trim()}</span>`).join(''):'—';
                const canCancel=['pending','processing'].includes(j.state);
                const canRetry=j.state==='dead';
                return`<tr>
                    <td><code style="color:var(--accent-cyan);font-size:.8rem">${id}</code></td>
                    <td><span class="cmd-text">${cmd}</span></td>
                    <td><span class="state-badge state-${j.state}">${j.state}</span></td>
                    <td><span class="priority-badge priority-${pName}">${pName}</span></td>
                    <td>${tags}</td>
                    <td>${j.attempts||0}</td>
                    <td style="color:${j.exit_code===0?'var(--accent-green)':j.exit_code?'var(--accent-red)':'var(--text-muted)'}">${j.exit_code!==null?j.exit_code:'—'}</td>
                    <td style="color:var(--text-muted);font-size:.8rem">${formatDate(j.created_at)}</td>
                    <td>
                        <a href="/logs/${j.id}" class="action-btn">logs</a>
                        ${canCancel?`<button class="action-btn danger" onclick="cancelJob('${j.id}')">cancel</button>`:''}
                        ${canRetry?`<button class="action-btn" onclick="retryJob('${j.id}')">retry</button>`:''}
                    </td>
                </tr>`}).join('')}
        function searchJobs(){loadJobs()}
        async function cancelJob(id){if(confirm('Cancel job '+id+'?')){await fetch('/api/jobs/'+id+'/cancel',{method:'POST'});loadJobs()}}
        async function retryJob(id){if(confirm('Retry job '+id+'?')){await fetch('/api/jobs/'+id+'/retry',{method:'POST'});loadJobs()}}
        loadJobs();setInterval(loadJobs,10000);
    </script>
</body>
</html>
